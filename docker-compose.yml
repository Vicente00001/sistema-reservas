services:
  app:
    build: .
    # En local usa el puerto 8080. En Dokploy/producción, Traefik enruta
    # automáticamente al puerto interno definido por la variable PORT.
    # No necesitas exponer puertos al host en producción.
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./data:/data
    environment:
      PORT: ${PORT:-8080}
      DB_PATH: /data/data.db
      APP_SECRET: ${APP_SECRET:-cambiar-por-una-clave-segura}
